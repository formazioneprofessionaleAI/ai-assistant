function makeIcon(size) {
  try {
    const c=document.createElement('canvas');c.width=c.height=size;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#0f0e0c';ctx.fillRect(0,0,size,size);
    ctx.fillStyle='#1c1a17';
    const r=size*.2,x=size*.1,w=size*.8;
    ctx.beginPath();ctx.moveTo(x+r,x);ctx.lineTo(x+w-r,x);ctx.arcTo(x+w,x,x+w,x+r,r);ctx.lineTo(x+w,x+w-r);ctx.arcTo(x+w,x+w,x+w-r,x+w,r);ctx.lineTo(x+r,x+w);ctx.arcTo(x,x+w,x,x+w-r,r);ctx.lineTo(x,x+r);ctx.arcTo(x,x,x+r,x,r);ctx.closePath();ctx.fill();
    ctx.fillStyle='#e8a87c';ctx.font=`bold ${size*.42}px Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('F',size/2,size/2+size*.04);
    return c.toDataURL('image/png');
  } catch(e){return'';}
}

const detectRole=(t)=>{
  const txt=t.toLowerCase().trim();
  const m=txt.match(/^(passa a|vai a|cambia a|usa|apri|switch to|go to|use)\s+(.+)$/);
  const cand=m?m[2]:txt;
  let best=null,score=0;
  for(const r of ROLES) for(const kw of r.keywords) if(cand.includes(kw)&&kw.length>score){score=kw.length;best=r;}
  return score>0?best:null;
};

const toB64=(file)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});

const buildBlocks=(text,atts)=>{
  const blocks=[];
  for(const a of atts){
    if(a.type==='image')blocks.push({type:'image',source:{type:'base64',media_type:a.mt,data:a.data}});
    else if(a.type==='pdf')blocks.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:a.data}});
    else if(a.type==='text')blocks.push({type:'text',text:'[File: '+a.name+']\n\n'+a.text});
  }
  if(text)blocks.push({type:'text',text});
  return blocks;
};

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMD(text){
  if(!text)return'';
  // First, extract and protect code blocks
  const codeBlocks=[];
  let t=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(match,lang,code)=>{
    const idx=codeBlocks.length;
    codeBlocks.push('<pre style="background:#0d1f0d;border:1px solid #2a5a2a;border-radius:8px;padding:14px 16px;font-family:\'DM Mono\',monospace;font-size:13px;overflow-x:auto;white-space:pre;word-break:normal;color:#90d090;margin:10px 0;display:block;line-height:1.6">'+escapeHtml(code.replace(/^\n/,'').replace(/\n$/,''))+'</pre>');
    return'\x00CODE'+idx+'\x00';
  });
  // Inline code
  t=t.replace(/`([^`]+)`/g,(match,code)=>'<code style="background:rgba(0,0,0,.4);padding:2px 6px;border-radius:4px;font-family:\'DM Mono\',monospace;font-size:13px;color:#90d090">'+escapeHtml(code)+'</code>');
  t=t
    .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:#f0ebe3;font-weight:600">$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/^# (.+)$/gm,'<div style="font-size:20px;font-weight:600;color:#f0ebe3;margin:12px 0 6px">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="font-size:17px;font-weight:600;color:#e8a87c;margin:10px 0 5px">$1</div>')
    .replace(/^### (.+)$/gm,'<div style="font-size:15px;font-weight:600;color:#c8c2c0;margin:8px 0 4px">$1</div>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:10px 0"/>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#e8a87c;flex-shrink:0;font-family:\'DM Mono\',monospace;font-size:13px">$1.</span><span>$2</span></div>')
    .replace(/^[-*] (.+)$/gm,'<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#e8a87c;flex-shrink:0">·</span><span>$1</span></div>')
    .replace(/\n(?!<)/g,'<br/>');
  // Restore code blocks
  codeBlocks.forEach((block,i)=>{t=t.replace('\x00CODE'+i+'\x00',block);});
  return t;
}

function useTTS(){
  const synth=typeof window!=='undefined'?window.speechSynthesis||null:null;
  const [speaking,setSpeaking]=useState(false);
  const [spIdx,setSpIdx]=useState(null);
  const [lang,setLang]=useState('it-IT');
  const [voices,setVoices]=useState([]);
  const [elKey,setElKeyState]=useState(()=>store.get('friday-elkey')||'');
  const [elVoice,setElVoiceState]=useState(()=>store.get('friday-elvoice')||'cgSgspJ2msm6clMCkdW9');
  const audioRef=useRef(null);
  useEffect(()=>{if(!synth)return;const load=()=>setVoices(synth.getVoices());load();synth.onvoiceschanged=load;return()=>synth.cancel();},[]);
  const stopAudio=useCallback(()=>{if(audioRef.current){audioRef.current.pause();audioRef.current=null;}if(synth)synth.cancel();setSpeaking(false);setSpIdx(null);},[synth]);
  const speakEL=useCallback(async(text,idx)=>{
    if(spIdx===idx&&speaking){stopAudio();return;}
    setSpeaking(true);setSpIdx(idx);
    try{
      const clean=text.replace(/<[^>]*>/g,'').replace(/[#*`_~]/g,'').replace(/\n+/g,' ').trim();
      const res=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+elVoice,{
        method:'POST',headers:{'Content-Type':'application/json','xi-api-key':elKey},
        body:JSON.stringify({text:clean,model_id:'eleven_multilingual_v2',voice_settings:{stability:0.5,similarity_boost:0.8,style:0.2,use_speaker_boost:true}})
      });
      if(!res.ok)throw new Error('EL error');
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url);
      audioRef.current=audio;
      audio.onended=()=>{setSpeaking(false);setSpIdx(null);URL.revokeObjectURL(url);};
      audio.onerror=()=>{setSpeaking(false);setSpIdx(null);};
      audio.play();
    }catch(e){
      setSpeaking(false);setSpIdx(null);
      if(synth){const clean=text.replace(/<[^>]*>/g,'').replace(/[#*`_~]/g,'').trim();const u=new SpeechSynthesisUtterance(clean);u.lang=lang;u.onend=()=>{setSpeaking(false);setSpIdx(null);};synth.speak(u);setSpeaking(true);setSpIdx(idx);}
    }
  },[elKey,elVoice,spIdx,speaking,stopAudio,synth,lang]);
  const speakBrowser=useCallback((text,idx)=>{
    if(!synth)return;synth.cancel();
    if(spIdx===idx&&speaking){setSpeaking(false);setSpIdx(null);return;}
    const clean=text.replace(/<[^>]*>/g,'').replace(/[#*`_~]/g,'').trim();
    const u=new SpeechSynthesisUtterance(clean);u.lang=lang;
    const v=voices.find(v=>v.lang===lang)||voices.find(v=>v.lang.startsWith(lang.split('-')[0]));
    if(v)u.voice=v;
    u.onstart=()=>{setSpeaking(true);setSpIdx(idx);};u.onend=u.onerror=()=>{setSpeaking(false);setSpIdx(null);};
    synth.speak(u);
  },[synth,lang,voices,speaking,spIdx]);
  const speak=useCallback((text,idx)=>{if(elKey)speakEL(text,idx);else speakBrowser(text,idx);},[elKey,speakEL,speakBrowser]);
  const setElKey=(k)=>{store.set('friday-elkey',k);setElKeyState(k);};
  const setElVoice=(v)=>{store.set('friday-elvoice',v);setElVoiceState(v);};
  return{speak,stop:stopAudio,speaking,spIdx,lang,setLang,supported:true,elKey,setElKey,elVoice,setElVoice};
}

const Dots=()=><div style={{display:'flex',gap:5,padding:'4px 0',alignItems:'center'}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'rgba(255,255,255,.6)',animation:'bounce 1.2s ease-in-out infinite',animationDelay:i*.2+'s'}}/>)}</div>;

function Setup({onSave}){
  const [key,setKey]=useState('');
  const ok=key.trim().startsWith('sk-');
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',gap:24,background:'#0f0e0c'}}>
      <div style={{fontSize:52,fontWeight:700,color:'#e8a87c',fontFamily:"'DM Mono',monospace",letterSpacing:'-3px'}}>F.</div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:26,fontWeight:600,color:'#f0ebe3',marginBottom:8}}>FRIDAY</div>
        <div style={{fontSize:15,lineHeight:1.8,color:'#b8b2ae',fontFamily:"'DM Mono',monospace"}}>Inserisci la tua Anthropic API Key<br/>per attivare Friday.</div>
      </div>
      <div style={{width:'100%',maxWidth:360,display:'flex',flexDirection:'column',gap:12}}>
        <input type="password" placeholder="sk-ant-api03-..." value={key} onChange={e=>setKey(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&ok)onSave(key.trim());}}
          style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'12px 16px',color:'#f0ebe3',fontSize:15,outline:'none',fontFamily:"'DM Mono',monospace",width:'100%'}}/>
        <button onClick={()=>{if(ok)onSave(key.trim());}} disabled={!ok}
          style={{background:ok?'#e8a87c':'rgba(255,255,255,.08)',border:'none',borderRadius:10,padding:'13px',color:ok?'#0f0e0c':'#4a4540',fontSize:16,fontWeight:600,cursor:ok?'pointer':'not-allowed',transition:'all .2s'}}>
          Attiva Friday →
        </button>
      </div>
      <div style={{fontSize:13,color:'#a09995',fontFamily:"'DM Mono',monospace",textAlign:'center',lineHeight:1.8}}>La chiave viene salvata solo sul tuo dispositivo.</div>
    </div>
  );
}

function Sidebar({open,onClose,tts,autoSpeak,setAutoSpeak,voiceOk,role,roles,onRoleSelect,onClearChat,onLogout,onGoHome,showWelcome}){
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:10}}/>
      <div style={{position:'fixed',left:0,top:0,bottom:0,width:215,background:'#0c0b09',borderRight:'1px solid rgba(255,255,255,.06)',zIndex:11,display:'flex',flexDirection:'column',padding:'52px 9px 14px',gap:1,overflowY:'auto'}}>
        <button onClick={onClose} style={{position:'absolute',top:12,right:10,background:'transparent',border:'none',cursor:'pointer',color:'#c8c2c0',fontSize:20,padding:4}}>✕</button>

        {!showWelcome && ['Contenuti','Tecnici'].map(g=>(
          <div key={g}>
            <div className="glabel">{g}</div>
            {roles.filter(r=>r.group===g).map(r=>(
              <button key={r.id} className={'rb'+(role.id===r.id?' act':'')} onClick={()=>{onRoleSelect(r);onClose();}}>
                <span style={{fontSize:14}}>{r.icon}</span>
                <span style={{flex:1}}>{r.label}</span>
                {role.id===r.id&&<div style={{width:5,height:5,borderRadius:'50%',background:r.color,animation:'pulse 2s ease infinite'}}/>}
              </button>
            ))}
          </div>
        ))}

        <div style={{flex:1}}/>

        {tts.supported&&(
          <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:9,padding:'9px 11px',fontSize:13,color:'#a09995',fontFamily:"'DM Mono',monospace",marginBottom:6}}>
            <div style={{color:'#d0cac8',marginBottom:8,fontWeight:600}}>Voce — Friday</div>
            <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',marginBottom:10}} onClick={()=>setAutoSpeak(v=>!v)}>
              <div style={{width:28,height:15,borderRadius:8,background:autoSpeak?'#34a853':'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',position:'relative',flexShrink:0,transition:'background .2s'}}>
                <div style={{width:11,height:11,borderRadius:'50%',background:'#f0ebe3',position:'absolute',top:1,left:autoSpeak?'14px':'1px',transition:'left .2s'}}/>
              </div>
              Lettura automatica
            </label>
            <div style={{borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:8,marginBottom:6}}>
              <div style={{color:'#e8a87c',fontSize:11,marginBottom:5,display:'flex',alignItems:'center',gap:5}}>
                <span>🎙 ElevenLabs</span>
                {tts.elKey&&<span style={{color:'#34a853',fontSize:10}}>● attivo</span>}
              </div>
              <input type="password" placeholder="API key ElevenLabs..." value={tts.elKey} onChange={e=>tts.setElKey(e.target.value)}
                style={{width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:6,padding:'5px 8px',color:'#f0ebe3',fontSize:11,outline:'none',fontFamily:"'DM Mono',monospace",marginBottom:6}}/>
              {tts.elKey&&(
                <select value={tts.elVoice} onChange={e=>tts.setElVoice(e.target.value)} style={{width:'100%',marginBottom:4}}>
                  <option value="cgSgspJ2msm6clMCkdW9">🇮🇹 Friday — Isabella</option>
                  <option value="pFZP5JQG7iQjIQuC4Bku">🇮🇹 Friday — Lily</option>
                  <option value="EXAVITQu4vr4xnSDxMaL">🇺🇸 Friday — Sarah</option>
                  <option value="TX3LPaxmHKxFdv7VOQHJ">🇺🇸 Friday — Liam</option>
                </select>
              )}
              {!tts.elKey&&<div style={{fontSize:10,color:'#555048',lineHeight:1.6}}>elevenlabs.io → free 10k chars/mese</div>}
            </div>
            {!tts.elKey&&(
              <select value={tts.lang} onChange={e=>tts.setLang(e.target.value)} style={{width:'100%',marginTop:4}}>
                <option value="it-IT">🇮🇹 Italiano (browser)</option>
                <option value="en-US">🇺🇸 English (browser)</option>
                <option value="fr-FR">🇫🇷 Français (browser)</option>
                <option value="es-ES">🇪🇸 Español (browser)</option>
              </select>
            )}
          </div>
        )}

        {voiceOk&&<div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:9,padding:'9px 11px',fontSize:13,color:'#a09995',fontFamily:"'DM Mono',monospace",marginBottom:6,lineHeight:1.9}}>
          <span style={{color:'#d0cac8',fontWeight:600}}>Comandi vocali</span><br/>
          "passa a Make"<br/>"usa Glide"<br/>"cambia a Sheets"
        </div>}

        {!showWelcome&&<button onClick={onClearChat} style={{background:'transparent',border:'1px solid rgba(255,255,255,.07)',borderRadius:7,padding:'8px 10px',color:'#b8b2ae',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:13,marginTop:4,transition:'all .2s'}}
          onMouseEnter={e=>e.target.style.color='#f87171'} onMouseLeave={e=>e.target.style.color='#b8b2ae'}>↺ Cancella cronologia</button>}
        {!showWelcome&&<button onClick={onGoHome} style={{background:'transparent',border:'none',color:'#888280',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:12,padding:'4px 0',marginTop:4}}>⌂ Torna alla home</button>}
        <button onClick={onLogout} style={{background:'transparent',border:'none',color:'#555048',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:11,padding:'4px 0',marginTop:2}}>⊗ Reimposta API key</button>
      </div>
    </>
  );
}

function App(){
  const [apiKey,setApiKey]=useState(()=>store.get('friday-apikey')||'');
  const [role,setRole]=useState(ROLES[0]);
  const [showWelcome,setShowWelcome]=useState(true);
  const [customPrompt,setCustomPrompt]=useState('');
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [atts,setAtts]=useState([]);
  const [loading,setLoading]=useState(false);
  const [sidebar,setSidebar]=useState(false);
  const [copied,setCopied]=useState(null);
  const [listening,setListening]=useState(false);
  const [voiceOk,setVoiceOk]=useState(false);
  const [voiceLang,setVoiceLang]=useState('it-IT');
  const [interim,setInterim]=useState('');
  const [roleFlash,setRoleFlash]=useState(null);
  const [drag,setDrag]=useState(false);
  const [camera,setCamera]=useState(false);
  const [camStream,setCamStream]=useState(null);
  const [autoSpeak,setAutoSpeak]=useState(false);
  const [editPrompt,setEditPrompt]=useState(false);
  const [wListening,setWListening]=useState(false);
  const [wInterim,setWInterim]=useState('');
  const [wError,setWError]=useState('');

  const tts=useTTS();
  const recRef=useRef(null);
  const wRecRef=useRef(null);
  const bottomRef=useRef(null);
  const taRef=useRef(null);
  const fileRef=useRef(null);
  const camFileRef=useRef(null);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);

  const saveKey=(k)=>{store.set('friday-apikey',k);setApiKey(k);};
  const logout=()=>{store.del('friday-apikey');setApiKey('');};

  useEffect(()=>{
    try{const s=store.get(SK(role.id));setMessages(s?JSON.parse(s):[]);}catch{setMessages([]);}
  },[role.id]);
  useEffect(()=>{if(messages.length===0)return;try{store.set(SK(role.id),JSON.stringify(messages));}catch{};},[messages,role.id]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages,loading]);
  useEffect(()=>{if(taRef.current){taRef.current.style.height='auto';taRef.current.style.height=Math.min(taRef.current.scrollHeight,130)+'px';}},[input]);
  useEffect(()=>{setVoiceOk(!!(window.SpeechRecognition||window.webkitSpeechRecognition));},[]);
  useEffect(()=>{
    if(camera&&videoRef.current){
      navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
        .then(s=>{setCamStream(s);videoRef.current.srcObject=s;}).catch(()=>setCamera(false));
    }
  },[camera]);

  const closeCamera=()=>{if(camStream)camStream.getTracks().forEach(t=>t.stop());setCamStream(null);setCamera(false);};
  const snapPhoto=()=>{
    const v=videoRef.current,c=canvasRef.current;if(!v||!c)return;
    c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);
    c.toBlob(blob=>{if(!blob)return;processFiles([new File([blob],'foto_'+Date.now()+'.jpg',{type:'image/jpeg'})]);closeCamera();},'image/jpeg',.9);
  };

  const processFiles=useCallback(async(files)=>{
    const res=[];
    for(const f of files){
      if(f.type.startsWith('image/')){const data=await toB64(f);res.push({id:Date.now()+Math.random(),type:'image',name:f.name,mt:f.type,data,prev:URL.createObjectURL(f)});}
      else if(f.type==='application/pdf'){const data=await toB64(f);res.push({id:Date.now()+Math.random(),type:'pdf',name:f.name,data});}
      else if(f.type.startsWith('text/')||f.type==='application/json'){const text=await f.text();res.push({id:Date.now()+Math.random(),type:'text',name:f.name,text});}
    }
    setAtts(p=>[...p,...res]);
  },[]);

  const handleFiles=e=>{if(e.target.files?.length)processFiles(Array.from(e.target.files));e.target.value='';};

  const stopListen=useCallback(()=>{if(recRef.current){recRef.current.stop();recRef.current=null;}setListening(false);setInterim('');},[]);
  const startListen=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    const r=new SR();r.lang=voiceLang;r.interimResults=true;r.continuous=true;
    r.onstart=()=>setListening(true);
    r.onresult=e=>{
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)fin+=t;else int+=t;}
      if(fin){const nr=detectRole(fin);if(nr){setRole(nr);setEditPrompt(false);setRoleFlash(nr);setTimeout(()=>setRoleFlash(null),2000);setInterim('');}else{setInput(p=>(p?p+' ':'')+fin.trim());setInterim('');}}
      else setInterim(int);
    };
    r.onerror=(e)=>{if(e.error!=='no-speech'){setListening(false);setInterim('');recRef.current=null;}};
    r.onend=()=>{
      // Restart if still supposed to be listening (browser stops after silence)
      if(recRef.current){try{recRef.current.start();}catch(e){setListening(false);setInterim('');recRef.current=null;}}
    };
    recRef.current=r;r.start();
  },[voiceLang]);

  const toggleWelcomeMic=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setWError('Microfono non supportato su questo browser');return;}
    if(wListening){if(wRecRef.current){wRecRef.current.stop();wRecRef.current=null;}setWListening(false);setWInterim('');return;}
    setWError('');
    const r=new SR();r.lang='it-IT';r.interimResults=true;r.continuous=false;
    r.onstart=()=>setWListening(true);
    r.onresult=e=>{
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)fin+=t;else int+=t;}
      if(fin){const nr=detectRole(fin);if(nr){setWInterim('');setWListening(false);setRole(nr);setShowWelcome(false);}else{setWInterim('');setWError('Non ho capito. Prova: "usa Glide", "passa a Make"…');}}
      else setWInterim(int);
    };
    r.onerror=(e)=>{if(e.error!=='no-speech'){setWListening(false);setWInterim('');setWError('Errore microfono. Riprova.');}};
    r.onend=()=>{
      if(wRecRef.current){try{wRecRef.current.start();}catch(e){setWListening(false);wRecRef.current=null;}}
    };
    wRecRef.current=r;r.start();
  };

  const activePrompt=role.id==='custom'&&customPrompt?customPrompt:role.prompt;

  const send=async()=>{
    if((!input.trim()&&atts.length===0)||loading)return;
    stopListen();tts.stop();
    const blocks=buildBlocks(input.trim(),atts);
    const userMsg={role:'user',content:blocks};
    const display={role:'user',content:input.trim(),atts:atts.map(a=>({type:a.type,name:a.name,prev:a.prev}))};
    const history=messages.map(m=>({role:m.role,content:typeof m.content==='string'?m.content:m.content}));
    setMessages(p=>[...p,display]);setInput('');setAtts([]);setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,system:activePrompt,messages:[...history,userMsg]}),
      });
      const data=await res.json();
      if(data.error){setMessages(p=>[...p,{role:'assistant',content:'Errore API\nTipo: '+data.error.type+'\nMessaggio: '+data.error.message}]);}
      else{
        const reply=data.content?.[0]?.text||'Nessuna risposta.';
        setMessages(p=>{
          const updated=[...p,{role:'assistant',content:reply}];
          if(autoSpeak&&tts.supported)setTimeout(()=>tts.speak(reply,updated.length-1),200);
          return updated;
        });
      }
    }catch(e){setMessages(p=>[...p,{role:'assistant',content:'Errore di connessione. Verifica la rete.'}]);}
    setLoading(false);
  };

  const clearChat=()=>{tts.stop();setMessages([]);try{store.del(SK(role.id));}catch{}};
  const handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const copy=(t,i)=>{navigator.clipboard?.writeText(t);setCopied(i);setTimeout(()=>setCopied(null),1800);};
  const attIcon=t=>({image:'🖼',pdf:'📄',text:'📝'}[t]||'📎');

  if(!apiKey)return <Setup onSave={saveKey}/>;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',background:'#0f0e0c',position:'relative'}}
      onDragOver={e=>{e.preventDefault();if(!showWelcome)setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files?.length)processFiles(Array.from(e.dataTransfer.files));}}>

      {roleFlash&&<div className="flash"><div style={{width:24,height:24,borderRadius:5,background:roleFlash.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>{roleFlash.icon}</div><span style={{fontWeight:600}}>{roleFlash.label}</span></div>}
      {drag&&<div style={{position:'fixed',inset:0,background:'rgba(15,14,12,.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,border:'2px dashed rgba(255,255,255,.2)',borderRadius:16,pointerEvents:'none'}}><div style={{textAlign:'center',color:'#f0ebe3'}}><div style={{fontSize:36,marginBottom:8}}>📎</div><div>Rilascia il file</div></div></div>}
      {camera&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.95)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:200,gap:16}}>
        <video ref={videoRef} autoPlay playsInline style={{width:'min(90vw,420px)',borderRadius:14,background:'#000'}}/>
        <canvas ref={canvasRef} style={{display:'none'}}/>
        <div style={{display:'flex',gap:12}}>
          <button onClick={snapPhoto} style={{background:'#fff',border:'none',borderRadius:'50%',width:58,height:58,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center'}}>📸</button>
          <button onClick={closeCamera} style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',borderRadius:'50%',width:58,height:58,cursor:'pointer',color:'#f0ebe3',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
      </div>}

      <input ref={fileRef} type="file" multiple accept="image/*,application/pdf,text/*,application/json" style={{display:'none'}} onChange={handleFiles}/>
      <input ref={camFileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFiles}/>

      <Sidebar open={sidebar} onClose={()=>setSidebar(false)} tts={tts} autoSpeak={autoSpeak} setAutoSpeak={setAutoSpeak}
        voiceOk={voiceOk} role={role} roles={ROLES} onRoleSelect={(r)=>{setRole(r);setEditPrompt(false);}}
        onClearChat={()=>{clearChat();setSidebar(false);}} onLogout={logout}
        onGoHome={()=>{tts.stop();setShowWelcome(true);setSidebar(false);}} showWelcome={showWelcome}/>

      {showWelcome ? (
        <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',background:'#0f0e0c',overflowY:'auto',overflowX:'hidden'}}>
          <div style={{width:'100%',maxWidth:560}}>
            <div style={{padding:'14px 20px 0',display:'flex',justifyContent:'flex-start'}}>
              <button onClick={()=>setSidebar(true)} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:10,width:40,height:40,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#b8b2b0',transition:'all .2s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.12)';e.currentTarget.style.color='#f0ebe3';}}
                onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.06)';e.currentTarget.style.color='#b8b2b0';}}>
                <MenuIcon/>
              </button>
            </div>
            <div className="w-anim" style={{animationDelay:'.05s',padding:'28px 28px 32px',textAlign:'center'}}>
              <div style={{fontSize:52,fontWeight:700,color:'#e8a87c',fontFamily:"'DM Mono',monospace",letterSpacing:'-3px',lineHeight:1,marginBottom:20}}>F.</div>
              <div style={{fontSize:34,fontWeight:600,color:'#f0ebe3',fontFamily:"'Crimson Pro',serif",lineHeight:1.25,marginBottom:12}}>Ciao Paolo,<br/>sono Friday.</div>
              <div style={{display:'inline-flex',alignItems:'center',gap:10,justifyContent:'center'}}>
                <div style={{fontSize:19,color:'#908880',fontFamily:"'Crimson Pro',serif"}}>In cosa posso aiutarti oggi?</div>
                {voiceOk&&<button onClick={toggleWelcomeMic} style={{background:wListening?'#ef4444':'rgba(255,255,255,.08)',border:'1px solid '+(wListening?'#ef4444':'rgba(255,255,255,.15)'),borderRadius:'50%',width:34,height:34,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',boxShadow:wListening?'0 0 0 6px rgba(239,68,68,.2)':'none'}}>
                  <MicIcon on={wListening}/>
                </button>}
              </div>
              {wInterim&&<div style={{marginTop:10,fontSize:14,color:'rgba(240,235,227,.5)',fontStyle:'italic',fontFamily:"'Crimson Pro',serif"}}>{wInterim}…</div>}
              {wError&&<div style={{marginTop:8,fontSize:13,color:'#f87171',fontFamily:"'DM Mono',monospace"}}>{wError}</div>}
              {wListening&&!wInterim&&<div style={{marginTop:10,fontSize:13,color:'#ef4444',fontFamily:"'DM Mono',monospace"}}>In ascolto… dì "usa Glide", "passa a Make"…</div>}
            </div>
            <div style={{padding:'0 20px 40px',display:'flex',flexDirection:'column',gap:32}}>
              {GROUPS.map((group,gi)=>(
                <div key={group} className="w-anim" style={{animationDelay:.18+gi*.1+'s'}}>
                  <div className="grp-lbl">{group}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {ROLES.filter(r=>r.group===group).map(r=>(
                      <button key={r.id} className="rc" onClick={()=>{setRole(r);setShowWelcome(false);}}>
                        <div className="rc-icon" style={{background:r.color+'25',border:'1px solid '+r.color+'50'}}><span>{r.icon}</span></div>
                        <div style={{flex:1,minWidth:0}}>
                          <div className="rc-label">{r.label}</div>
                          <div className="rc-desc">{ROLE_DESC[r.id]||''}</div>
                        </div>
                        <div className="rc-arr">›</div>
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      ) : (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
          <div style={{padding:'11px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:10,background:'#0f0e0c',flexShrink:0}}>
            <button onClick={()=>setSidebar(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#c8c2c0',padding:4,borderRadius:6,display:'flex',alignItems:'center'}}><MenuIcon/></button>
            <div style={{width:30,height:30,borderRadius:7,background:role.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0,transition:'background .3s'}}>{role.icon}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:19,fontWeight:600,color:'#f0ebe3',lineHeight:1.2}}>{role.label}</div>
              <div style={{fontSize:12,color:'#a09995',fontFamily:"'DM Mono',monospace"}}>{Math.ceil(messages.length/2)===0?'pronto':Math.ceil(messages.length/2)+' scambi'}{tts.speaking&&' · in lettura…'}</div>
            </div>
            <button onClick={()=>setEditPrompt(e=>!e)} style={{marginLeft:'auto',background:'transparent',border:'1px solid rgba(255,255,255,.07)',borderRadius:6,padding:'4px 9px',color:'#b8b2ae',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:12,flexShrink:0}}>
              {editPrompt?'✕':'⚙'}
            </button>
          </div>

          {editPrompt&&<div style={{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',background:'#0d0c0a',flexShrink:0}}>
            <div style={{fontSize:11,color:'#a09995',marginBottom:5,fontFamily:"'DM Mono',monospace"}}>SYSTEM PROMPT — {role.id==='custom'?'modificabile':'sola lettura'}</div>
            <textarea value={role.id==='custom'?(customPrompt||role.prompt):activePrompt}
              onChange={e=>{if(role.id==='custom')setCustomPrompt(e.target.value);}}
              readOnly={role.id!=='custom'} rows={4}
              style={{width:'100%',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:8,padding:'8px 12px',color:role.id==='custom'?'#f0ebe3':'#a09995',fontFamily:"'DM Mono',monospace",fontSize:12,resize:'vertical',outline:'none',lineHeight:1.6}}/>
          </div>}

          <div style={{flex:1,overflowY:'auto',padding:'16px 14px 8px',display:'flex',flexDirection:'column',gap:14}}>
            {messages.length===0&&<div style={{margin:'auto',textAlign:'center',color:'#4a4540',maxWidth:320,padding:'0 8px'}}>
              <div style={{fontSize:32,marginBottom:10}}>{role.icon}</div>
              <div style={{fontSize:22,color:'#c8c2c0',marginBottom:6}}>{role.label}</div>
              <div style={{fontSize:15,lineHeight:1.8,color:'#a09995'}}>Ciao, sono pronta.<br/>Scrivi, parla, allega file o foto.</div>
            </div>}

            {messages.map((msg,i)=>{
              const txt=typeof msg.content==='string'?msg.content:(Array.isArray(msg.content)?msg.content.filter(b=>b.type==='text').map(b=>b.text).join('\n'):'');
              const isSpk=tts.spIdx===i&&tts.speaking;
              return(
                <div key={i} className="msg-in" style={{display:'flex',flexDirection:msg.role==='user'?'row-reverse':'row',gap:8,alignItems:'flex-start'}}>
                  {msg.role==='assistant'&&<div style={{width:26,height:26,borderRadius:6,background:role.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,marginTop:2}}>{role.icon}</div>}
                  <div style={{maxWidth:'80%',display:'flex',flexDirection:'column',gap:3}}>
                    {msg.atts?.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5,justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:3}}>
                      {msg.atts.map((a,ai)=><div key={ai} style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',borderRadius:7,padding:'3px 7px',fontSize:12,color:'#a09a90'}}>
                        {a.prev?<img src={a.prev} alt="" style={{width:28,height:28,objectFit:'cover',borderRadius:4}}/>:<span>{attIcon(a.type)}</span>}
                        <span style={{maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'DM Mono',monospace",fontSize:11}}>{a.name}</span>
                      </div>)}
                    </div>}
                    {txt&&<div style={{background:msg.role==='user'?'rgba(255,255,255,.07)':'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:msg.role==='user'?'11px 11px 3px 11px':'11px 11px 11px 3px',padding:'11px 15px',fontSize:17,lineHeight:1.8,color:'#ede8e0'}}
                      dangerouslySetInnerHTML={{__html:msg.role==='assistant'?renderMD(txt):txt.replace(/\n/g,'<br/>')}}/>}
                    {msg.role==='assistant'&&<div style={{display:'flex',alignItems:'center',gap:2,'--rc':role.color}}>
                      {tts.supported&&<button className={'ab'+(isSpk?' spk':'')} onClick={()=>tts.speak(txt,i)}><SpkIcon on={isSpk}/>{isSpk?'stop':'leggi'}</button>}
                      <button className="ab" onClick={()=>copy(txt,i)}>{copied===i?'✓ copiato':'⎘ copia'}</button>
                    </div>}
                  </div>
                </div>
              );
            })}

            {loading&&<div className="msg-in" style={{display:'flex',gap:8}}>
              <div style={{width:26,height:26,borderRadius:6,background:role.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,marginTop:2}}>{role.icon}</div>
              <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'11px 11px 11px 3px',padding:'11px 15px'}}><Dots/></div>
            </div>}
            <div ref={bottomRef}/>
          </div>

          {atts.length>0&&<div style={{padding:'7px 14px',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',gap:7,flexWrap:'wrap',background:'#0d0c0a',flexShrink:0}}>
            {atts.map(a=><div key={a.id} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'4px 8px',fontSize:12,color:'#c8c3bb',position:'relative'}}>
              {a.prev?<img src={a.prev} alt={a.name} style={{width:30,height:30,objectFit:'cover',borderRadius:4}}/>:<span style={{fontSize:17}}>{attIcon(a.type)}</span>}
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</span>
              <button onClick={()=>setAtts(p=>p.filter(x=>x.id!==a.id))} style={{background:'rgba(0,0,0,.5)',border:'none',borderRadius:'50%',width:15,height:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#f0ebe3',fontSize:9,position:'absolute',top:-5,right:-5}}>✕</button>
            </div>)}
          </div>}

          <div style={{padding:'10px 14px 14px',borderTop:'1px solid rgba(255,255,255,.06)',background:'#0f0e0c',flexShrink:0}}>
            {interim&&<div style={{marginBottom:6,padding:'4px 11px',background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.18)',borderRadius:8,fontSize:15,color:'rgba(240,235,227,.5)',fontStyle:'italic'}}>{interim}…</div>}
            <div style={{display:'flex',gap:7,alignItems:'flex-end'}}>
              <button className="ib" onClick={()=>fileRef.current?.click()} title="Allega file"><AttachIcon/></button>
              <button className="ib" onClick={()=>{if(/Mobi|Android/i.test(navigator.userAgent))camFileRef.current?.click();else setCamera(true);}} title="Fotocamera"><CamIcon/></button>
              <textarea ref={taRef} className={'ti'+(listening?' von':'')} value={input}
                onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
                placeholder={listening?'Sto ascoltando…':atts.length?'Aggiungi testo…':'Scrivi a '+role.label+'…'} rows={1}/>
              {voiceOk&&<div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'center'}}>
                <button className={'ib'+(listening?' mic-on':'')} onClick={()=>listening?stopListen():startListen()}><MicIcon on={listening}/></button>
                <select value={voiceLang} onChange={e=>setVoiceLang(e.target.value)} style={{width:38,textAlign:'center'}}>
                  <option value="it-IT">🇮🇹</option><option value="en-US">🇺🇸</option>
                  <option value="fr-FR">🇫🇷</option><option value="es-ES">🇪🇸</option>
                </select>
              </div>}
              <button className="sb" style={{'--rc':role.color}} onClick={send} disabled={(!input.trim()&&atts.length===0)||loading}>
                <SendIcon/>
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

try{
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}catch(e){
  document.getElementById('root').innerHTML='<div style="color:#e8a87c;padding:32px;font-family:monospace;font-size:14px;background:#0f0e0c;height:100vh"><b>Errore Friday:</b><br/>'+e.message+'</div>';
}
</script>
</body>
</html>
