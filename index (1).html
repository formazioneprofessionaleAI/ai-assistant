function makeIcon(size) {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    // bg
    ctx.fillStyle = '#0f0e0c'; ctx.fillRect(0, 0, size, size);
    // card
    ctx.fillStyle = '#1c1a17';
    const r = size * 0.2, x = size * 0.1, w = size * 0.8;
    ctx.beginPath();
    ctx.moveTo(x + r, x); ctx.lineTo(x + w - r, x);
    ctx.arcTo(x + w, x, x + w, x + r, r);
    ctx.lineTo(x + w, x + w - r);
    ctx.arcTo(x + w, x + w, x + w - r, x + w, r);
    ctx.lineTo(x + r, x + w);
    ctx.arcTo(x, x + w, x, x + w - r, r);
    ctx.lineTo(x, x + r);
    ctx.arcTo(x, x, x + r, x, r);
    ctx.closePath(); ctx.fill();
    // symbol
    ctx.fillStyle = '#e8a87c';
    ctx.font = `bold ${size * 0.38}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('✦', size / 2, size / 2 + size * 0.02);
    return c.toDataURL('image/png');
  } catch(e) { return ''; }
}

// Service Worker (inline blob) — caches the shell for offline use
if ('serviceWorker' in navigator) {
  const sw = `
const CACHE='ai-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!==CACHE).map(n=>caches.delete(n)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('api.anthropic.com')||e.request.url.includes('fonts.g')) return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(res.ok){const rc=res.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));}
    return res;
  }).catch(()=>new Response('Offline',{status:503}))));
});`;
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))
  ).catch(() => {});
}

// ── Voice detection ────────────────────────────────────────
const detectRole = (t) => {
  const txt = t.toLowerCase().trim();
  const m = txt.match(/^(passa a|vai a|cambia a|usa|apri|switch to|go to|use)\s+(.+)$/);
  const cand = m ? m[2] : txt;
  let best = null, score = 0;
  for (const r of ROLES) for (const kw of r.keywords)
    if (cand.includes(kw) && kw.length > score) { score = kw.length; best = r; }
  return score > 0 ? best : null;
};

// ── File helpers ──────────────────────────────────────────
const toB64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(',')[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});

const buildBlocks = (text, atts) => {
  const blocks = [];
  for (const a of atts) {
    if (a.type === 'image') blocks.push({ type:'image', source:{ type:'base64', media_type:a.mt, data:a.data } });
    else if (a.type === 'pdf') blocks.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data:a.data } });
    else if (a.type === 'text') blocks.push({ type:'text', text:`[File: ${a.name}]\n\n${a.text}` });
  }
  if (text) blocks.push({ type:'text', text });
  return blocks;
};

// ── TTS hook ─────────────────────────────────────────────
function useTTS() {
  const synth = typeof window !== 'undefined' ? window.speechSynthesis || null : null;
  const [speaking, setSpeaking] = useState(false);
  const [spIdx, setSpIdx] = useState(null);
  const [lang, setLang] = useState('it-IT');
  const [voices, setVoices] = useState([]);

  useEffect(() => {
    if (!synth) return;
    const load = () => setVoices(synth.getVoices());
    load();
    synth.onvoiceschanged = load;
    return () => synth.cancel();
  }, []);

  const speak = useCallback((text, idx) => {
    if (!synth) return;
    synth.cancel();
    if (spIdx === idx && speaking) { setSpeaking(false); setSpIdx(null); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    const v = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
    if (v) u.voice = v;
    u.onstart = () => { setSpeaking(true); setSpIdx(idx); };
    u.onend = u.onerror = () => { setSpeaking(false); setSpIdx(null); };
    synth.speak(u);
  }, [synth, lang, voices, speaking, spIdx]);

  const stop = useCallback(() => { if (synth) synth.cancel(); setSpeaking(false); setSpIdx(null); }, [synth]);
  return { speak, stop, speaking, spIdx, lang, setLang, supported: !!synth };
}

// ── Main App ──────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => store.get('apikey') || '');
  const [role, setRole] = useState(ROLES[0]);
  const [customPrompt, setCustomPrompt] = useState('');
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [atts, setAtts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [sidebar, setSidebar] = useState(false);
  const [copied, setCopied] = useState(null);
  const [listening, setListening] = useState(false);
  const [voiceOk, setVoiceOk] = useState(false);
  const [voiceLang, setVoiceLang] = useState('it-IT');
  const [interim, setInterim] = useState('');
  const [roleFlash, setRoleFlash] = useState(null);
  const [drag, setDrag] = useState(false);
  const [camera, setCamera] = useState(false);
  const [camStream, setCamStream] = useState(null);
  const [autoSpeak, setAutoSpeak] = useState(false);
  const [editPrompt, setEditPrompt] = useState(false);

  const tts = useTTS();
  const recRef = useRef(null);
  const bottomRef = useRef(null);
  const taRef = useRef(null);
  const fileRef = useRef(null);
  const camFileRef = useRef(null);
  const videoRef = useRef(null);
  const canvasRef = useRef(null);

  // Save API key
  const saveKey = (k) => { store.set('apikey', k); setApiKey(k); };
  const logout = () => { store.del('apikey'); setApiKey(''); };

  // Load chat per role
  useEffect(() => {
    try { const s = store.get(SK(role.id)); setMessages(s ? JSON.parse(s) : []); } catch { setMessages([]); }
  }, [role.id]);

  // Save chat
  useEffect(() => {
    if (messages.length === 0) return;
    try { store.set(SK(role.id), JSON.stringify(messages)); } catch {}
  }, [messages, role.id]);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);
  useEffect(() => {
    if (taRef.current) { taRef.current.style.height='auto'; taRef.current.style.height=Math.min(taRef.current.scrollHeight,130)+'px'; }
  }, [input]);
  useEffect(() => { setVoiceOk(!!(window.SpeechRecognition||window.webkitSpeechRecognition)); }, []);

  // Camera
  useEffect(() => {
    if (camera && videoRef.current) {
      navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
        .then(s=>{setCamStream(s);videoRef.current.srcObject=s;})
        .catch(()=>setCamera(false));
    }
  }, [camera]);

  const closeCamera = () => { if(camStream)camStream.getTracks().forEach(t=>t.stop()); setCamStream(null); setCamera(false); };
  const snapPhoto = () => {
    const v=videoRef.current,c=canvasRef.current; if(!v||!c)return;
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    c.toBlob(blob=>{if(!blob)return;processFiles([new File([blob],`foto_${Date.now()}.jpg`,{type:'image/jpeg'})]);closeCamera();},'image/jpeg',.9);
  };

  const processFiles = useCallback(async (files) => {
    const res = [];
    for (const f of files) {
      if (f.type.startsWith('image/')) { const data=await toB64(f); res.push({id:Date.now()+Math.random(),type:'image',name:f.name,mt:f.type,data,prev:URL.createObjectURL(f)}); }
      else if (f.type==='application/pdf') { const data=await toB64(f); res.push({id:Date.now()+Math.random(),type:'pdf',name:f.name,data}); }
      else if (f.type.startsWith('text/')||f.type==='application/json') { const text=await f.text(); res.push({id:Date.now()+Math.random(),type:'text',name:f.name,text}); }
    }
    setAtts(p=>[...p,...res]);
  }, []);

  const handleFiles = e => { if(e.target.files?.length) processFiles(Array.from(e.target.files)); e.target.value=''; };

  // STT
  const stopListen = useCallback(()=>{ if(recRef.current){recRef.current.stop();recRef.current=null;} setListening(false);setInterim(''); },[]);
  const startListen = useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR)return;
    const r=new SR(); r.lang=voiceLang; r.interimResults=true; r.continuous=false;
    r.onstart=()=>setListening(true);
    r.onresult=e=>{
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript; if(e.results[i].isFinal)fin+=t;else int+=t;}
      if(fin){const nr=detectRole(fin); if(nr){setRole(nr);setEditPrompt(false);setRoleFlash(nr);setTimeout(()=>setRoleFlash(null),2000);setInterim('');}else{setInput(p=>(p?p+' ':'')+fin.trim());setInterim('');}}
      else setInterim(int);
    };
    r.onerror=r.onend=()=>{setListening(false);setInterim('');recRef.current=null;};
    recRef.current=r; r.start();
  },[voiceLang]);

  const activePrompt = role.id==='custom'&&customPrompt ? customPrompt : role.prompt;

  const send = async () => {
    if((!input.trim()&&atts.length===0)||loading)return;
    stopListen(); tts.stop();
    const blocks = buildBlocks(input.trim(), atts);
    const userMsg = {role:'user', content: blocks};
    const display = {role:'user', content:input.trim(), atts:atts.map(a=>({type:a.type,name:a.name,prev:a.prev}))};
    const history = messages.map(m=>({role:m.role, content:typeof m.content==='string'?m.content:(Array.isArray(m.content)?m.content:m.content)}));
    setMessages(p=>[...p,display]);
    setInput(''); setAtts([]);
    setLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:activePrompt,messages:[...history,userMsg]}),
      });
      const data=await res.json();
      if(data.error){setMessages(p=>[...p,{role:'assistant',content:`Errore API: ${data.error.message}`}]);}
      else{
        const reply=data.content?.[0]?.text||'Nessuna risposta.';
        setMessages(p=>{
          const updated=[...p,{role:'assistant',content:reply}];
          if(autoSpeak&&tts.supported)setTimeout(()=>tts.speak(reply,updated.length-1),200);
          return updated;
        });
      }
    } catch(e) {
      setMessages(p=>[...p,{role:'assistant',content:'Errore di connessione. Verifica la rete e riprova.'}]);
    }
    setLoading(false);
  };

  const clearChat = () => { tts.stop(); setMessages([]); try{store.del(SK(role.id));}catch{} };
  const handleKey = e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const copy = (t,i)=>{ navigator.clipboard?.writeText(t); setCopied(i); setTimeout(()=>setCopied(null),1800); };
  const attIcon = t=>({image:'🖼',pdf:'📄',text:'📝'}[t]||'📎');

  if (!apiKey) return <Setup onSave={saveKey}/>;

  const msgCount = Math.ceil(messages.length/2);

  return (
    <div style={{height:'100%',display:'flex',overflow:'hidden',background:'#0f0e0c'}}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files?.length)processFiles(Array.from(e.dataTransfer.files));}}>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');
        @keyframes bounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes ripple{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}100%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
        @keyframes spkPulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes flashIn{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
        .msg-in{animation:fadeUp .25s ease forwards}
        .rb{width:100%;background:transparent;border:1px solid transparent;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:9px;color:#c8c2c0;font-family:'Crimson Pro',serif;font-size:16px;transition:all .18s;text-align:left}
        .rb:hover,.rb.act{background:rgba(255,255,255,.07);color:#f0ebe3}
        .rb.act{border-color:rgba(255,255,255,.1)}
        .ib{border:none;border-radius:9px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:rgba(255,255,255,.06);color:#b8b2b0}
        .ib:hover{background:rgba(255,255,255,.12);color:#f0ebe3}
        .ib.mic-on{background:#ef4444;color:#fff;animation:ripple 1s ease-out infinite}
        .sb{background:var(--rc,#e8a87c);border:none;border-radius:9px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:#0f0e0c}
        .sb:hover:not(:disabled){opacity:.8;transform:scale(1.05)}
        .sb:disabled{opacity:.2;cursor:not-allowed}
        .ti{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;color:#f0ebe3;font-family:'Crimson Pro',serif;font-size:15px;resize:none;outline:none;line-height:1.5;transition:border-color .2s;min-height:44px;max-height:130px}
        .ti::placeholder{color:#7a7470}
        .ti:focus{border-color:rgba(255,255,255,.25)}
        .ti.von{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
        .ab{background:transparent;border:none;cursor:pointer;color:#a8a29f;font-size:13px;padding:3px 7px;border-radius:4px;font-family:'DM Mono',monospace;transition:color .2s;display:flex;align-items:center;gap:4px}
        .ab:hover{color:#f0ebe3}
        .ab.spk{color:var(--rc,#e8a87c);animation:spkPulse 1.2s ease infinite}
        ::-webkit-scrollbar{width:2px}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:1px}
        textarea{overflow-y:auto}
        select{background:#1a1916;border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#b8b2b0;font-family:'DM Mono',monospace;font-size:12px;padding:4px 6px;cursor:pointer;outline:none}
        .glabel{font-size:11px;letter-spacing:.14em;color:#888280;text-transform:uppercase;padding:10px 6px 4px;font-family:'DM Mono',monospace}
        .flash{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#1c1a17;border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:9px 16px;display:flex;align-items:center;gap:9px;font-size:13px;color:#f0ebe3;z-index:999;animation:flashIn .3s ease;box-shadow:0 6px 24px rgba(0,0,0,.7);pointer-events:none;white-space:nowrap}
      `}</style>

      {/* ROLE FLASH */}
      {roleFlash && <div className="flash"><div style={{width:24,height:24,borderRadius:5,background:roleFlash.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>{roleFlash.icon}</div><span style={{fontWeight:600}}>{roleFlash.label}</span></div>}

      {/* DRAG OVERLAY */}
      {drag && <div style={{position:'fixed',inset:0,background:'rgba(15,14,12,.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,border:'2px dashed rgba(255,255,255,.2)',borderRadius:16,pointerEvents:'none'}}><div style={{textAlign:'center',color:'#f0ebe3'}}><div style={{fontSize:36,marginBottom:8}}>📎</div><div style={{fontSize:16}}>Rilascia il file</div></div></div>}

      {/* CAMERA */}
      {camera && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.95)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:200,gap:16}}>
        <video ref={videoRef} autoPlay playsInline style={{width:'min(90vw,420px)',borderRadius:14,background:'#000'}}/>
        <canvas ref={canvasRef} style={{display:'none'}}/>
        <div style={{display:'flex',gap:12}}>
          <button onClick={snapPhoto} style={{background:'#fff',border:'none',borderRadius:'50%',width:58,height:58,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center'}}>📸</button>
          <button onClick={closeCamera} style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',borderRadius:'50%',width:58,height:58,cursor:'pointer',color:'#f0ebe3',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
      </div>}

      {/* Hidden inputs */}
      <input ref={fileRef} type="file" multiple accept="image/*,application/pdf,text/*,application/json" style={{display:'none'}} onChange={handleFiles}/>
      <input ref={camFileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFiles}/>

      {/* SIDEBAR (drawer on mobile) */}
      {sidebar && <>
        <div onClick={()=>setSidebar(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:10}}/>
        <div style={{position:'fixed',left:0,top:0,bottom:0,width:210,background:'#0c0b09',borderRight:'1px solid rgba(255,255,255,.06)',zIndex:11,display:'flex',flexDirection:'column',padding:'52px 9px 14px',gap:1,overflowY:'auto'}}>
          <button onClick={()=>setSidebar(false)} style={{position:'absolute',top:12,right:10,background:'transparent',border:'none',cursor:'pointer',color:'#c8c2c0',fontSize:20,padding:4}}>✕</button>
          {GROUPS.map(g=>(
            <div key={g}>
              <div className="glabel">{g}</div>
              {ROLES.filter(r=>r.group===g).map(r=>(
                <button key={r.id} className={`rb${role.id===r.id?' act':''}`} onClick={()=>{setRole(r);setEditPrompt(false);setSidebar(false);}}>
                  <span style={{fontSize:14}}>{r.icon}</span>
                  <span style={{flex:1}}>{r.label}</span>
                  {role.id===r.id&&<div style={{width:5,height:5,borderRadius:'50%',background:r.color,animation:'pulse 2s ease infinite'}}/>}
                </button>
              ))}
            </div>
          ))}
          <div style={{flex:1}}/>

          {tts.supported && (
            <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:9,padding:'9px 11px',fontSize:13,color:'#a09995',fontFamily:"'DM Mono',monospace"}}>
              <div style={{color:'#d0cac8',marginBottom:6,fontWeight:600}}>Voce</div>
              <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer'}} onClick={()=>setAutoSpeak(v=>!v)}>
                <div style={{width:28,height:15,borderRadius:8,background:autoSpeak?'#34a853':'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',position:'relative',flexShrink:0,transition:'background .2s'}}>
                  <div style={{width:11,height:11,borderRadius:'50%',background:'#f0ebe3',position:'absolute',top:1,left:autoSpeak?'14px':'1px',transition:'left .2s'}}/>
                </div>
                Lettura automatica
              </label>
              <select value={tts.lang} onChange={e=>tts.setLang(e.target.value)} style={{width:'100%',marginTop:7}}>
                <option value="it-IT">🇮🇹 Italiano</option>
                <option value="en-US">🇺🇸 English</option>
                <option value="fr-FR">🇫🇷 Français</option>
                <option value="es-ES">🇪🇸 Español</option>
              </select>
            </div>
          )}

          {voiceOk && <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:9,padding:'9px 11px',fontSize:12.5,color:'#a09995',fontFamily:"'DM Mono',monospace",marginTop:6,lineHeight:1.9}}>
            <span style={{color:'#d0cac8',fontWeight:600}}>Comandi vocali</span><br/>
            "passa a Make"<br/>"usa Glide"<br/>"cambia a Sheets"
          </div>}

          <button onClick={clearChat} style={{background:'transparent',border:'1px solid rgba(255,255,255,.07)',borderRadius:7,padding:'7px 10px',color:'#b8b2ae',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:13,marginTop:8,transition:'all .2s'}}
            onMouseEnter={e=>e.target.style.color='#f87171'} onMouseLeave={e=>e.target.style.color='#4a4540'}>
            ↺ Cancella cronologia
          </button>
          <button onClick={logout} style={{background:'transparent',border:'none',color:'#888280',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:12,padding:'6px 0',marginTop:4}}>
            ⊗ Reimposta API key
          </button>
        </div>
      </>}

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

        {/* HEADER */}
        <div style={{padding:'11px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:10,background:'#0f0e0c',flexShrink:0}}>
          <button onClick={()=>setSidebar(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#c8c2c0',padding:4,borderRadius:6,display:'flex',alignItems:'center'}}>
            <MenuIcon/>
          </button>
          <div style={{width:30,height:30,borderRadius:7,background:role.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,transition:'background .3s'}}>{role.icon}</div>
          <div style={{minWidth:0}}>
            <div style={{fontSize:16,fontWeight:600,color:'#f0ebe3',lineHeight:1.2}}>{role.label}</div>
            <div style={{fontSize:12,color:'#a09995',fontFamily:"'DM Mono',monospace"}}>{msgCount===0?'pronto':`${msgCount} scambi`}{tts.speaking&&' · in lettura…'}</div>
          </div>
          <button onClick={()=>setEditPrompt(e=>!e)} style={{marginLeft:'auto',background:'transparent',border:'1px solid rgba(255,255,255,.07)',borderRadius:6,padding:'4px 9px',color:'#b8b2ae',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:12,flexShrink:0}}>
            {editPrompt?'✕':'⚙'}
          </button>
        </div>

        {/* PROMPT EDITOR */}
        {editPrompt && <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,.06)',background:'#0d0c0a',flexShrink:0}}>
          <div style={{fontSize:12,color:'#a09995',marginBottom:5,fontFamily:"'DM Mono',monospace"}}>SYSTEM PROMPT — {role.id==='custom'?'modificabile':'sola lettura'}</div>
          <textarea value={role.id==='custom'?(customPrompt||role.prompt):activePrompt}
            onChange={e=>{if(role.id==='custom')setCustomPrompt(e.target.value);}}
            readOnly={role.id!=='custom'} rows={4}
            style={{width:'100%',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:8,padding:'8px 12px',color:role.id==='custom'?'#f0ebe3':'#5a5550',fontFamily:"'DM Mono',monospace",fontSize:11,resize:'vertical',outline:'none',lineHeight:1.6}}/>
        </div>}

        {/* MESSAGES */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 14px 8px',display:'flex',flexDirection:'column',gap:14}}>
          {messages.length===0&&<div style={{margin:'auto',textAlign:'center',color:'#a8a29f',maxWidth:320,animation:'fadeUp .5s ease',padding:'0 8px'}}>
            <div style={{fontSize:32,marginBottom:10}}>{role.icon}</div>
            <div style={{fontSize:19,color:'#c8c2c0',marginBottom:5}}>{role.label}</div>
            <div style={{fontSize:15,lineHeight:1.8,color:'#a09995',marginBottom:16}}>
              Scrivi, parla, allega file o foto.<br/>Ogni risposta ha il tasto 🔊.
            </div>
            <div style={{fontSize:13,color:'#888280',fontFamily:"'DM Mono',monospace",lineHeight:2}}>
              📎 file · 📷 foto · 🎙 voce · 🔊 leggi
            </div>
          </div>}

          {messages.map((msg,i)=>{
            const txt = typeof msg.content==='string'?msg.content:(Array.isArray(msg.content)?msg.content.filter(b=>b.type==='text').map(b=>b.text).join('\n'):'');
            const isSpk = tts.spIdx===i&&tts.speaking;
            return (
              <div key={i} className="msg-in" style={{display:'flex',flexDirection:msg.role==='user'?'row-reverse':'row',gap:8,alignItems:'flex-start'}}>
                {msg.role==='assistant'&&<div style={{width:24,height:24,borderRadius:5,background:role.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0,marginTop:2}}>{role.icon}</div>}
                <div style={{maxWidth:'82%',display:'flex',flexDirection:'column',gap:3}}>
                  {msg.atts?.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5,justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:3}}>
                    {msg.atts.map((a,ai)=><div key={ai} style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',borderRadius:7,padding:'3px 7px',fontSize:11,color:'#a09a90'}}>
                      {a.prev?<img src={a.prev} alt="" style={{width:28,height:28,objectFit:'cover',borderRadius:4}}/>:<span>{attIcon(a.type)}</span>}
                      <span style={{maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'DM Mono',monospace"}}>{a.name}</span>
                    </div>)}
                  </div>}
                  {txt&&<div style={{background:msg.role==='user'?'rgba(255,255,255,.07)':'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:msg.role==='user'?'11px 11px 3px 11px':'11px 11px 11px 3px',padding:'11px 15px',fontSize:17,lineHeight:1.8,color:'#ede8e0',whiteSpace:'pre-wrap'}}>
                    {txt}
                  </div>}
                  {msg.role==='assistant'&&<div style={{display:'flex',alignItems:'center',gap:2,'--rc':role.color}}>
                    {tts.supported&&<button className={`ab${isSpk?' spk':''}`} onClick={()=>tts.speak(txt,i)} title={isSpk?'Ferma':'Leggi'}>
                      <SpkIcon on={isSpk}/>{isSpk?'stop':'leggi'}
                    </button>}
                    <button className="ab" onClick={()=>copy(txt,i)}>{copied===i?'✓ copiato':'⎘ copia'}</button>
                  </div>}
                </div>
              </div>
            );
          })}

          {loading&&<div className="msg-in" style={{display:'flex',gap:8}}>
            <div style={{width:24,height:24,borderRadius:5,background:role.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0,marginTop:2}}>{role.icon}</div>
            <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'11px 11px 11px 3px',padding:'9px 13px'}}><Dots/></div>
          </div>}
          <div ref={bottomRef}/>
        </div>

        {/* ATTACHMENTS PREVIEW */}
        {atts.length>0&&<div style={{padding:'7px 14px',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',gap:7,flexWrap:'wrap',background:'#0d0c0a',animation:'fadeUp .2s ease',flexShrink:0}}>
          {atts.map(a=><div key={a.id} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'4px 8px',fontSize:11,color:'#c8c3bb',position:'relative'}}>
            {a.prev?<img src={a.prev} alt={a.name} style={{width:30,height:30,objectFit:'cover',borderRadius:4}}/>:<span style={{fontSize:16}}>{attIcon(a.type)}</span>}
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</span>
            <button onClick={()=>setAtts(p=>p.filter(x=>x.id!==a.id))} style={{background:'rgba(0,0,0,.5)',border:'none',borderRadius:'50%',width:15,height:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#f0ebe3',fontSize:9,position:'absolute',top:-5,right:-5}}>✕</button>
          </div>)}
        </div>}

        {/* INPUT */}
        <div style={{padding:'10px 14px 14px',borderTop:'1px solid rgba(255,255,255,.06)',background:'#0f0e0c',flexShrink:0}}>
          {interim&&<div style={{marginBottom:6,padding:'4px 11px',background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.18)',borderRadius:8,fontSize:15,color:'rgba(240,235,227,.55)',fontStyle:'italic'}}>{interim}…</div>}
          <div style={{display:'flex',gap:7,alignItems:'flex-end'}}>
            <button className="ib" onClick={()=>fileRef.current?.click()} title="Allega file"><AttachIcon/></button>
            <button className="ib" onClick={()=>{if(/Mobi|Android/i.test(navigator.userAgent))camFileRef.current?.click();else setCamera(true);}} title="Fotocamera"><CamIcon/></button>
            <textarea ref={taRef} className={`ti${listening?' von':''}`} value={input}
              onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
              placeholder={listening?'Sto ascoltando…':atts.length?'Aggiungi testo…':`Scrivi a ${role.label}…`} rows={1}/>
            {voiceOk&&<div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'center'}}>
              <button className={`ib${listening?' mic-on':''}`} onClick={()=>listening?stopListen():startListen()}><MicIcon on={listening}/></button>
              <select value={voiceLang} onChange={e=>setVoiceLang(e.target.value)} style={{width:38,textAlign:'center'}}>
                <option value="it-IT">🇮🇹</option><option value="en-US">🇺🇸</option>
                <option value="fr-FR">🇫🇷</option><option value="es-ES">🇪🇸</option>
              </select>
            </div>}
            <button className="sb" style={{'--rc':role.color}} onClick={send} disabled={(!input.trim()&&atts.length===0)||loading}>
              <SendIcon/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
